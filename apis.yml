aid: telewerken
name: Telewerken
description: >-
  Telewerken.be is a Belgian information platform dedicated to remote work (telewerken),
  operated jointly by Vias Institute and the FOD Mobiliteit en Vervoer (Federal Public
  Service for Mobility and Transport). The platform provides comprehensive resources on
  Belgian telework legislation, regulations, employer obligations, employee rights, and
  telework statistics. Belgium's remote work framework is governed by Collective Bargaining
  Agreement No. 85 (CBA 85) and the Law of 5 March 2017 on feasible and workable work.
  The platform serves both employers and employees navigating Belgium's structured telework
  policy landscape.
